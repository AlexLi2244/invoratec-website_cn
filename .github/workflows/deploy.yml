name: Deploy Website to ECS

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Create deployment package
        run: tar -czf dist.tar.gz -C dist .

      - name: Deploy to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          password: ${{ secrets.ECS_PASSWORD }}
          source: dist.tar.gz
          target: /tmp/

      - name: Atomic deploy with backup + rollback (preserves /downloads/)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          password: ${{ secrets.ECS_PASSWORD }}
          script: |
            REMOTE=/var/www/www.invoratec.cn
            BACKUP_DIR=/var/www/www.invoratec.cn.backup
            BACKUP_KEEP=3
            STAGING=/tmp/website-staging-$$

            # ─── 1. Backup current (excluding /downloads/ — those are managed by Addin CI/CD) ───
            if [ -d "$REMOTE" ] && [ "$(ls -A $REMOTE 2>/dev/null)" ]; then
              TS=$(date +%Y%m%d-%H%M%S)
              mkdir -p $BACKUP_DIR
              tar -czf $BACKUP_DIR/$TS.tar.gz --exclude='downloads' -C $REMOTE . 2>/dev/null
              ls -1t $BACKUP_DIR/*.tar.gz 2>/dev/null | tail -n +$((BACKUP_KEEP+1)) | xargs -r rm -f
              echo "Backup created: $TS.tar.gz (excluding /downloads/)"
            fi

            # ─── 2. Atomic deploy: extract to staging, validate, then swap ───
            mkdir -p $STAGING
            tar -xzf /tmp/dist.tar.gz -C $STAGING
            rm /tmp/dist.tar.gz

            if [ ! -f "$STAGING/index.html" ]; then
              echo "ERROR: dist.tar.gz did not contain index.html — aborting"
              rm -rf $STAGING
              exit 1
            fi

            # Preserve /downloads/ (Addin CI/CD MSI + version.json)
            mv $REMOTE/downloads /tmp/preserve-downloads-$$ 2>/dev/null || true

            # Atomic swap
            rm -rf $REMOTE/*
            cp -r $STAGING/. $REMOTE/
            rm -rf $STAGING

            # Restore /downloads/ — Addin's MSI wins over website's bundled fallback
            if [ -d "/tmp/preserve-downloads-$$" ]; then
              mkdir -p $REMOTE/downloads
              cp -r /tmp/preserve-downloads-$$/. $REMOTE/downloads/
              rm -rf /tmp/preserve-downloads-$$
            fi
            echo "Website deployed at $(date)"

            # ─── 3. Verify, rollback on failure ───
            # Hit HTTPS directly (port 80 returns 301 → 443 by nginx config, which
            # is correct behavior, so a status of 301 alone doesn't prove the
            # site renders). curl -k skips cert chain validation since we hit
            # 127.0.0.1; -L follows the HTTP→HTTPS redirect if any.
            sleep 3
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" -H "Host: www.invoratec.cn" -L https://127.0.0.1/)
            echo "HTTPS status (via local nginx): $STATUS"

            if [ "$STATUS" != "200" ]; then
              echo "=== Verify FAILED ($STATUS) — initiating rollback ==="
              LATEST_BACKUP=$(ls -1t $BACKUP_DIR/*.tar.gz 2>/dev/null | head -1)
              if [ -n "$LATEST_BACKUP" ]; then
                # Preserve downloads again before restoring
                mv $REMOTE/downloads /tmp/preserve-downloads-rb-$$ 2>/dev/null || true
                rm -rf $REMOTE/*
                tar -xzf $LATEST_BACKUP -C $REMOTE
                # Restore downloads
                if [ -d "/tmp/preserve-downloads-rb-$$" ]; then
                  mkdir -p $REMOTE/downloads
                  cp -r /tmp/preserve-downloads-rb-$$/. $REMOTE/downloads/
                  rm -rf /tmp/preserve-downloads-rb-$$
                fi
                sleep 3
                ROLLBACK_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" -H "Host: www.invoratec.cn" -L https://127.0.0.1/)
                if [ "$ROLLBACK_STATUS" = "200" ]; then
                  echo "=== Rollback SUCCESS ==="
                else
                  echo "=== Rollback FAILED ($ROLLBACK_STATUS) ==="
                fi
              else
                echo "No backup available — cannot rollback"
              fi
              exit 1
            fi
            echo "=== Deploy + verify SUCCESS ==="
